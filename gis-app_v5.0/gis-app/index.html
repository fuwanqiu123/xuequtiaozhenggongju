<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XX市学区范围绘制工具</title>
    <!-- 使用国内 CDN 加速 -->
    <!-- OpenLayers 8.2.0 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/ol.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/dist/ol.min.js" onerror="window.resourceLoadError && window.resourceLoadError('OpenLayers')"></script>
    <!-- Font Awesome 6.4.0 -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- jQuery 3.6.0 -->
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js" onerror="window.resourceLoadError && window.resourceLoadError('jQuery')"></script>
    <!-- Turf.js 6.5.0 - 用于空间分析 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>
    <!-- 本地样式 -->
    <link rel="stylesheet" href="style.css">
    <!-- 图片配准工具样式 -->
    <link rel="stylesheet" href="image-overlay.css">
    <script>
        // 资源加载错误处理
        window.resourceLoadError = function(resourceName) {
            console.error('[资源加载失败] ' + resourceName);
            var loader = document.getElementById('pageLoader');
            var status = document.getElementById('loaderStatus');
            var tips = document.getElementById('loaderTips');
            
            if (status) {
                status.innerHTML = '<i class="fas fa-exclamation-triangle" style="color:#ff6b6b;"></i> ' + resourceName + ' 加载失败';
                status.style.color = '#ff6b6b';
            }
            if (tips) {
                tips.innerHTML = '<i class="fas fa-sync-alt"></i> 请检查网络连接后刷新页面重试';
                tips.style.color = '#ff6b6b';
                tips.style.animation = 'none';
            }
            if (loader) {
                loader.style.background = 'linear-gradient(135deg, #4a1c1c 0%, #721c24 100%)';
            }
        };
        
        // 全局错误处理
        window.onerror = function(msg, url, line) {
            console.error('[全局错误]', msg, url, line);
            if (msg && (msg.includes('ol') || msg.includes('OpenLayers'))) {
                window.resourceLoadError('地图引擎');
            } else if (msg && msg.includes('$') || msg.includes('jQuery')) {
                window.resourceLoadError('工具库');
            }
            return false;
        };
    </script>
</head>
<body>
    <!-- 页面加载进度条 -->
    <div id="pageLoader" class="page-loader">
        <div class="loader-content">
            <div class="loader-spinner">
                <div class="spinner-ring"></div>
                <div class="spinner-ring"></div>
                <div class="spinner-ring"></div>
            </div>
            <div class="loader-text">
                <h3><i class="fas fa-map-marked-alt"></i> 学区绘制工具</h3>
                <p id="loaderStatus">正在加载资源...</p>
            </div>
            <div class="loader-progress">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 5%;"></div>
                </div>
                <span class="progress-percent" id="progressPercent">5%</span>
            </div>
            <div class="loader-tips" id="loaderTips">
                <i class="fas fa-info-circle"></i> 首次加载可能需要一些时间，请耐心等待...
            </div>
            <noscript>
                <div style="color: #ff6b6b; margin-top: 15px; padding: 10px; background: rgba(255,0,0,0.1); border-radius: 6px;">
                    <i class="fas fa-exclamation-triangle"></i> 您的浏览器禁用了JavaScript，无法使用本工具。
                </div>
            </noscript>
        </div>
    </div>
    
    <!-- 标题栏 -->
    <div class="header">
        <div>
            <h1><i class="fas fa-map"></i> XX市学区范围绘制工具</h1>
        </div>
    </div>

    <!-- 主内容区域 -->
    <div class="main-content">
        <!-- 左侧边栏 - 学区文件分组管理 -->
        <div class="sidebar sidebar-left" id="sidebar">
            <!-- 侧边栏收缩按钮 -->
            <button id="sidebarToggle" class="sidebar-toggle" title="收缩/展开侧边栏">
                <i class="fas fa-chevron-left"></i>
            </button>
            
            <!-- 学区分组管理区域 -->
            <div class="group-manager-section">
                <div class="group-manager-header">
                    <span><i class="fas fa-layer-group"></i> 学区分组管理</span>
                    <div class="header-actions">
                        <span id="totalFileCountBadge" class="badge">0</span>
                    </div>
                </div>
                
                <!-- 分组Tab选项卡 -->
                <div class="group-tabs">
                    <div class="group-tab active" data-group="1">
                        <i class="fas fa-folder"></i> 学区组1
                        <span class="group-count" id="group1Count">0</span>
                    </div>
                    <div class="group-tab" data-group="2">
                        <i class="fas fa-folder"></i> 学区组2
                        <span class="group-count" id="group2Count">0</span>
                    </div>
                    <div class="group-tab" data-group="3">
                        <i class="fas fa-folder"></i> 学区组3
                        <span class="group-count" id="group3Count">0</span>
                    </div>
                </div>
                
                <!-- 全局控制按钮 -->
                <div class="global-controls">
                    <button id="toggleAllGroupsVisibility" class="btn-toggle-all-groups" title="全部学区组隐藏/显示">
                        <i class="fas fa-eye"></i> 全部学区组
                    </button>
                </div>
                
                <!-- 当前组的文件列表区域 -->
                <div class="group-file-list-container">
                    <!-- 组1文件列表 -->
                    <div class="group-file-list active" data-group="1">
                        <div class="group-file-header">
                            <span>学区组1文件列表</span>
                            <div class="header-actions">
                                <button class="btn-import-folder-group" data-group="1" title="导入整个文件夹">
                                    <i class="fas fa-folder-open"></i> 文件夹
                                </button>
                                <button class="btn-import-group" data-group="1" title="导入学区文件">
                                    <i class="fas fa-upload"></i> 导入
                                </button>
                            </div>
                        </div>
                        <div class="file-list-controls">
                            <div class="file-search-box">
                                <i class="fas fa-search"></i>
                                <input type="text" class="fileSearchInput" data-group="1" placeholder="搜索文件名...">
                                <button class="clearFileSearch" data-group="1" title="清除搜索"><i class="fas fa-times"></i></button>
                            </div>
                            <button class="btn-toggle-group-visibility" data-group="1" title="本组全部隐藏/显示">
                                <i class="fas fa-eye"></i> 本组
                            </button>
                        </div>
                        <div class="jsonFileList" data-group="1">
                            <div class="no-data">暂无学区文件，请导入</div>
                        </div>
                    </div>
                    
                    <!-- 组2文件列表 -->
                    <div class="group-file-list" data-group="2">
                        <div class="group-file-header">
                            <span>学区组2文件列表</span>
                            <div class="header-actions">
                                <button class="btn-import-folder-group" data-group="2" title="导入整个文件夹">
                                    <i class="fas fa-folder-open"></i> 文件夹
                                </button>
                                <button class="btn-import-group" data-group="2" title="导入学区文件">
                                    <i class="fas fa-upload"></i> 导入
                                </button>
                            </div>
                        </div>
                        <div class="file-list-controls">
                            <div class="file-search-box">
                                <i class="fas fa-search"></i>
                                <input type="text" class="fileSearchInput" data-group="2" placeholder="搜索文件名...">
                                <button class="clearFileSearch" data-group="2" title="清除搜索"><i class="fas fa-times"></i></button>
                            </div>
                            <button class="btn-toggle-group-visibility" data-group="2" title="本组全部隐藏/显示">
                                <i class="fas fa-eye"></i> 本组
                            </button>
                        </div>
                        <div class="jsonFileList" data-group="2">
                            <div class="no-data">暂无学区文件，请导入</div>
                        </div>
                    </div>
                    
                    <!-- 组3文件列表 -->
                    <div class="group-file-list" data-group="3">
                        <div class="group-file-header">
                            <span>学区组3文件列表</span>
                            <div class="header-actions">
                                <button class="btn-import-folder-group" data-group="3" title="导入整个文件夹">
                                    <i class="fas fa-folder-open"></i> 文件夹
                                </button>
                                <button class="btn-import-group" data-group="3" title="导入学区文件">
                                    <i class="fas fa-upload"></i> 导入
                                </button>
                            </div>
                        </div>
                        <div class="file-list-controls">
                            <div class="file-search-box">
                                <i class="fas fa-search"></i>
                                <input type="text" class="fileSearchInput" data-group="3" placeholder="搜索文件名...">
                                <button class="clearFileSearch" data-group="3" title="清除搜索"><i class="fas fa-times"></i></button>
                            </div>
                            <button class="btn-toggle-group-visibility" data-group="3" title="本组全部隐藏/显示">
                                <i class="fas fa-eye"></i> 本组
                            </button>
                        </div>
                        <div class="jsonFileList" data-group="3">
                            <div class="no-data">暂无学区文件，请导入</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 隐藏的文件输入 -->
            <input type="file" class="geoJSONFileGroup" data-group="1" accept=".geojson,.json" style="display: none;">
            <input type="file" class="geoJSONFolderGroup" data-group="1" webkitdirectory directory multiple style="display: none;">
            <input type="file" class="geoJSONFileGroup" data-group="2" accept=".geojson,.json" style="display: none;">
            <input type="file" class="geoJSONFolderGroup" data-group="2" webkitdirectory directory multiple style="display: none;">
            <input type="file" class="geoJSONFileGroup" data-group="3" accept=".geojson,.json" style="display: none;">
            <input type="file" class="geoJSONFolderGroup" data-group="3" webkitdirectory directory multiple style="display: none;">

            <!-- 状态信息 -->
            <div class="status-section">
                <div class="status-info">
                    <p><strong>当前模式:</strong> <span id="currentMode">浏览</span></p>
                    <p><strong>当前分组:</strong> <span id="currentGroup">学区组1</span></p>
                    <p><strong>选中学区:</strong> <span id="selectedJSON">无</span></p>
                    <p><strong>多边形数量:</strong> <span id="polygonCount">0</span></p>
                </div>
            </div>
            
            <!-- 天地图KEY管理 -->
            <div class="key-manager-section">
                <div class="key-manager-header" id="keyManagerToggle">
                    <span><i class="fas fa-key"></i> 天地图KEY管理</span>
                    <i class="fas fa-chevron-down" id="keyManagerArrow"></i>
                </div>
                <div class="key-manager-content" id="keyManagerContent" style="display: none;">
                    <div class="key-status">
                        <span class="key-status-label">当前使用:</span>
                        <span class="key-status-value" id="currentKeyIndex">1/7</span>
                        <span class="key-status-indicator" id="keyStatusIndicator" title="点击刷新状态"></span>
                    </div>
                    <div class="key-actions">
                        <button id="addKeyBtn" class="btn-key-action" title="添加新KEY">
                            <i class="fas fa-plus"></i> 添加
                        </button>
                        <button id="viewKeysBtn" class="btn-key-action" title="查看/管理KEY">
                            <i class="fas fa-list"></i> 管理
                        </button>
                        <button id="resetKeyBtn" class="btn-key-action" title="重置KEY状态">
                            <i class="fas fa-redo"></i> 重置
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 地图容器 -->
        <div class="map-container">
            <div id="map" class="map"></div>
            
            <!-- 地图悬浮工具栏 -->
            <div class="floating-toolbar">
                <!-- 搜索框 -->
                <div class="toolbar-search">
                    <input type="text" id="searchInput" placeholder="搜索地点...">
                    <button id="searchBtn" title="搜索">
                        <i class="fas fa-search"></i>
                    </button>
                    <button id="clearSearch" title="清除搜索">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                
                <!-- 工具按钮组 -->
                <div class="toolbar-group">
                    <button id="drawPolygon" title="绘制多边形">
                        <i class="fas fa-draw-polygon"></i>
                    </button>
                </div>
                
                <div class="toolbar-divider"></div>
                
                <!-- 辅助绘制工具 -->
                <div class="toolbar-group">
                    <button id="drawAssistLine" title="绘制辅助线">
                        <i class="fas fa-slash"></i>
                    </button>
                    <button id="drawAssistPolygon" title="绘制辅助多边形">
                        <i class="fas fa-square"></i>
                    </button>
                    <button id="drawAssistText" title="添加辅助文字">
                        <i class="fas fa-font"></i>
                    </button>
                    <button id="drawAssistPoint" title="添加辅助点">
                        <i class="fas fa-map-marker-alt"></i>
                    </button>
                </div>
                
                <div class="toolbar-divider"></div>
                
                <!-- 测量工具 -->
                <div class="toolbar-group">
                    <button id="measureLength" title="测距">
                        <i class="fas fa-ruler"></i>
                    </button>
                    <button id="measureArea" title="测面">
                        <i class="fas fa-draw-polygon"></i>
                    </button>
                    <button id="clearMeasure" title="清除测量结果" class="danger">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
                
                <div class="toolbar-divider"></div>
                
                <!-- 辅助要素管理 -->
                <div class="toolbar-group">
                    <button id="selectAssistFeature" title="选择辅助要素">
                        <i class="fas fa-hand-pointer"></i>
                    </button>
                    <button id="editAssistPolygon" title="编辑辅助多边形形状(进入后可点击顶点选中)" style="position: relative;">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button id="deleteAssistFeature" title="删除选中的辅助要素" class="danger">
                        <i class="fas fa-eraser"></i>
                    </button>
                    <button id="clearAssistFeatures" title="清除所有辅助要素" class="danger">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                    <button id="toggleAssistVisibility" title="隐藏/显示辅助要素">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                
                <div class="toolbar-divider"></div>
                
                <div class="toolbar-group">
                    <button id="selectPolygon" title="选择多边形">
                        <i class="fas fa-mouse-pointer"></i>
                    </button>
                    <button id="editPolygon" title="编辑多边形">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button id="deletePolygon" title="删除选中">
                        <i class="fas fa-trash"></i>
                    </button>
                    <button id="deleteVertex" title="删除顶点(编辑时)">
                        <i class="fas fa-cut"></i>
                    </button>
                </div>
                
                <div class="toolbar-divider"></div>
                
                <div class="toolbar-group">
                    <button id="exportGeoJSON" title="导出选中JSON">
                        <i class="fas fa-download"></i>
                    </button>
                </div>
                
                <div class="toolbar-divider"></div>
                
                <!-- 学区着色工具 -->
                <div class="toolbar-group">
                    <button id="colorDistricts" title="着色/取消着色学区">
                        <i class="fas fa-palette"></i>
                    </button>
                </div>
                
                <div class="toolbar-divider"></div>
                
                <!-- 图片配准工具 -->
                <div class="toolbar-group">
                    <button id="imageOverlayTool" title="图片配准工具 - 导入社区平面图">
                        <i class="fas fa-image"></i>
                    </button>
                </div>
            </div>
            
            <!-- 地图控制按钮 -->
            <div class="map-controls">
                <button id="zoomIn" title="放大"><i class="fas fa-plus"></i></button>
                <button id="zoomOut" title="缩小"><i class="fas fa-minus"></i></button>
                <button id="resetView" title="复位"><i class="fas fa-home"></i></button>
            </div>
            
            <!-- 底图图层控制按钮 -->
            <div class="layer-controls">
                <button id="toggleImageLayer" title="切换到影像底图"><i class="fas fa-map"></i></button>
                <button id="toggleOpacityPanel" title="图层透明度"><i class="fas fa-adjust"></i></button>
            </div>
            
            <!-- 透明度控制面板 -->
            <div id="opacityControlPanel" class="opacity-control-panel">
                <div class="opacity-header">
                    <span>图层透明度</span>
                    <span id="opacityValue">100%</span>
                </div>
                <div class="opacity-slider-container">
                    <input type="range" id="layerOpacity" min="0" max="1" step="0.05" value="1">
                    <div class="opacity-labels">
                        <span>0%</span>
                        <span>50%</span>
                        <span>100%</span>
                    </div>
                </div>
                <div class="opacity-info">
                    <i class="fas fa-info-circle"></i> 调整影像图层透明度
                </div>
            </div>
            
            <!-- 搜索结果面板 -->
            <div id="searchResultsPanel" class="search-results-panel">
                <div class="search-results-header">
                    <span>搜索结果</span>
                    <button id="closeSearchResults"><i class="fas fa-times"></i></button>
                </div>
                <div id="searchResults" class="search-results"></div>
            </div>
        </div>

        <!-- 右侧边栏 - 辅助元素文件列表 -->
        <div class="sidebar sidebar-right" id="rightSidebar">
            <!-- 右侧边栏收缩按钮 -->
            <button id="rightSidebarToggle" class="sidebar-toggle right" title="收缩/展开侧边栏">
                <i class="fas fa-chevron-right"></i>
            </button>
            
            <input type="file" id="assistGeoJSONFile" accept=".geojson,.json" style="display: none;">
            <input type="file" id="assistGeoJSONFolder" webkitdirectory directory multiple style="display: none;">

            <!-- 辅助元素文件管理区域 -->
            <div class="assist-manager-section" id="assistManagerSection">
                <div class="assist-file-list-header">
                    <span><i class="fas fa-shapes"></i> 辅助元素文件列表</span>
                    <div class="header-actions">
                        <span id="assistFileCountBadge" class="badge">0</span>
                        <button id="importAssistFolder" class="btn-import-folder" title="导入辅助元素文件夹">
                            <i class="fas fa-folder-open"></i> 文件夹
                        </button>
                        <button id="importAssistFile" class="btn-import" title="导入辅助元素文件">
                            <i class="fas fa-upload"></i> 导入
                        </button>
                    </div>
                </div>
                <!-- 辅助元素文件搜索和全部隐藏控制 -->
                <div class="file-list-controls">
                    <div class="file-search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="assistFileSearchInput" placeholder="搜索辅助元素文件...">
                        <button id="clearAssistFileSearch" title="清除搜索"><i class="fas fa-times"></i></button>
                    </div>
                    <button id="toggleAllAssistFilesVisibility" class="btn-toggle-all" title="全部隐藏/显示">
                        <i class="fas fa-eye"></i> 全部
                    </button>
                </div>
                <div id="assistFileList" class="assist-file-list">
                    <div class="no-data">暂无辅助元素文件，请导入</div>
                </div>
            </div>


        </div>
    </div>

    <script src="image-overlay.js"></script>
    <script src="app.js"></script>
</body>
</html>
