<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XX市学区范围绘制工具</title>
    <link rel="stylesheet" href="lib/ol.css">
    <link rel="stylesheet" href="fontawesome.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="lib/ol.js"></script>
    <script src="lib/jquery.min.js"></script>
</head>
<body>
    <!-- 标题栏 -->
    <div class="header">
        <div>
            <h1><i class="fas fa-map"></i> XX市学区范围绘制工具</h1>
        </div>
    </div>

    <!-- 主内容区域 -->
    <div class="main-content">
        <!-- 左侧边栏 - JSON文件列表 -->
        <div class="sidebar sidebar-left" id="sidebar">
            <!-- 侧边栏收缩按钮 -->
            <button id="sidebarToggle" class="sidebar-toggle" title="收缩/展开侧边栏">
                <i class="fas fa-chevron-left"></i>
            </button>
            
            <!-- JSON文件管理区域 -->
            <div class="json-manager-section">
                <div class="json-file-list-header">
                    <span><i class="fas fa-folder-open"></i> 学区文件列表</span>
                    <div class="header-actions">
                        <span id="jsonFileCountBadge" class="badge">0</span>
                        <button id="importFolder" class="btn-import-folder" title="导入整个文件夹">
                            <i class="fas fa-folder-open"></i> 文件夹
                        </button>
                        <button id="importGeoJSON" class="btn-import" title="导入学区文件">
                            <i class="fas fa-upload"></i> 导入
                        </button>
                    </div>
                </div>
                <!-- 文件搜索和全部隐藏控制 -->
                <div class="file-list-controls">
                    <div class="file-search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="fileSearchInput" placeholder="搜索文件名...">
                        <button id="clearFileSearch" title="清除搜索"><i class="fas fa-times"></i></button>
                    </div>
                    <button id="toggleAllFilesVisibility" class="btn-toggle-all" title="全部隐藏/显示">
                        <i class="fas fa-eye"></i> 全部
                    </button>
                </div>
                <div id="jsonFileList" class="json-file-list">
                    <div class="no-data">暂无学区文件，请导入</div>
                </div>
            </div>
            
            <input type="file" id="geoJSONFile" accept=".geojson,.json" style="display: none;">
            <input type="file" id="geoJSONFolder" webkitdirectory directory multiple style="display: none;">

            <!-- 状态信息 -->
            <div class="status-section">
                <div class="status-info">
                    <p><strong>当前模式:</strong> <span id="currentMode">浏览</span></p>
                    <p><strong>选中学区:</strong> <span id="selectedJSON">无</span></p>
                    <p><strong>多边形数量:</strong> <span id="polygonCount">0</span></p>
                </div>
            </div>
        </div>

        <!-- 地图容器 -->
        <div class="map-container">
            <div id="map" class="map"></div>
            
            <!-- 地图悬浮工具栏 -->
            <div class="floating-toolbar">
                <!-- 搜索框 -->
                <div class="toolbar-search">
                    <input type="text" id="searchInput" placeholder="搜索地点...">
                    <button id="searchBtn" title="搜索">
                        <i class="fas fa-search"></i>
                    </button>
                    <button id="clearSearch" title="清除搜索">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                
                <!-- 工具按钮组 -->
                <div class="toolbar-group">
                    <button id="drawPolygon" title="绘制多边形">
                        <i class="fas fa-draw-polygon"></i>
                    </button>
                </div>
                
                <div class="toolbar-divider"></div>
                
                <!-- 辅助绘制工具 -->
                <div class="toolbar-group">
                    <button id="drawAssistLine" title="绘制辅助线">
                        <i class="fas fa-slash"></i>
                    </button>
                    <button id="drawAssistPolygon" title="绘制辅助多边形">
                        <i class="fas fa-square"></i>
                    </button>
                    <button id="drawAssistText" title="添加辅助文字">
                        <i class="fas fa-font"></i>
                    </button>
                    <button id="drawAssistPoint" title="添加辅助点">
                        <i class="fas fa-map-marker-alt"></i>
                    </button>
                </div>
                
                <div class="toolbar-divider"></div>
                
                <!-- 测量工具 -->
                <div class="toolbar-group">
                    <button id="measureLength" title="测距">
                        <i class="fas fa-ruler"></i>
                    </button>
                    <button id="measureArea" title="测面">
                        <i class="fas fa-draw-polygon"></i>
                    </button>
                    <button id="clearMeasure" title="清除测量结果" class="danger">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
                
                <div class="toolbar-divider"></div>
                
                <!-- 辅助要素管理 -->
                <div class="toolbar-group">
                    <button id="selectAssistFeature" title="选择辅助要素">
                        <i class="fas fa-hand-pointer"></i>
                    </button>
                    <button id="editAssistPolygon" title="编辑辅助多边形形状(进入后可点击顶点选中)" style="position: relative;">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button id="deleteAssistFeature" title="删除选中的辅助要素" class="danger">
                        <i class="fas fa-eraser"></i>
                    </button>
                    <button id="clearAssistFeatures" title="清除所有辅助要素" class="danger">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                    <button id="toggleAssistVisibility" title="隐藏/显示辅助要素">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                
                <div class="toolbar-divider"></div>
                
                <div class="toolbar-group">
                    <button id="selectPolygon" title="选择多边形">
                        <i class="fas fa-mouse-pointer"></i>
                    </button>
                    <button id="editPolygon" title="编辑多边形">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button id="deletePolygon" title="删除选中">
                        <i class="fas fa-trash"></i>
                    </button>
                    <button id="deleteVertex" title="删除顶点(编辑时)">
                        <i class="fas fa-cut"></i>
                    </button>
                </div>
                
                <div class="toolbar-divider"></div>
                
                <div class="toolbar-group">
                    <button id="exportGeoJSON" title="导出选中JSON">
                        <i class="fas fa-download"></i>
                    </button>
                </div>
            </div>
            
            <!-- 地图控制按钮 -->
            <div class="map-controls">
                <button id="zoomIn" title="放大"><i class="fas fa-plus"></i></button>
                <button id="zoomOut" title="缩小"><i class="fas fa-minus"></i></button>
                <button id="resetView" title="复位"><i class="fas fa-home"></i></button>
            </div>
            
            <!-- 底图图层控制按钮 -->
            <div class="layer-controls">
                <button id="toggleImageLayer" title="切换到影像底图"><i class="fas fa-map"></i></button>
                <button id="toggleOpacityPanel" title="图层透明度"><i class="fas fa-adjust"></i></button>
            </div>
            
            <!-- 透明度控制面板 -->
            <div id="opacityControlPanel" class="opacity-control-panel">
                <div class="opacity-header">
                    <span>图层透明度</span>
                    <span id="opacityValue">100%</span>
                </div>
                <div class="opacity-slider-container">
                    <input type="range" id="layerOpacity" min="0" max="1" step="0.05" value="1">
                    <div class="opacity-labels">
                        <span>0%</span>
                        <span>50%</span>
                        <span>100%</span>
                    </div>
                </div>
                <div class="opacity-info">
                    <i class="fas fa-info-circle"></i> 调整影像图层透明度
                </div>
            </div>
            
            <!-- 搜索结果面板 -->
            <div id="searchResultsPanel" class="search-results-panel">
                <div class="search-results-header">
                    <span>搜索结果</span>
                    <button id="closeSearchResults"><i class="fas fa-times"></i></button>
                </div>
                <div id="searchResults" class="search-results"></div>
            </div>
        </div>

        <!-- 右侧边栏 - 辅助元素文件列表 -->
        <div class="sidebar sidebar-right" id="rightSidebar">
            <!-- 右侧边栏收缩按钮 -->
            <button id="rightSidebarToggle" class="sidebar-toggle right" title="收缩/展开侧边栏">
                <i class="fas fa-chevron-right"></i>
            </button>
            
            <input type="file" id="assistGeoJSONFile" accept=".geojson,.json" style="display: none;">
            <input type="file" id="assistGeoJSONFolder" webkitdirectory directory multiple style="display: none;">

            <!-- 辅助元素文件管理区域 -->
            <div class="assist-manager-section" id="assistManagerSection">
                <div class="assist-file-list-header">
                    <span><i class="fas fa-shapes"></i> 辅助元素文件列表</span>
                    <div class="header-actions">
                        <span id="assistFileCountBadge" class="badge">0</span>
                        <button id="importAssistFolder" class="btn-import-folder" title="导入辅助元素文件夹">
                            <i class="fas fa-folder-open"></i> 文件夹
                        </button>
                        <button id="importAssistFile" class="btn-import" title="导入辅助元素文件">
                            <i class="fas fa-upload"></i> 导入
                        </button>
                    </div>
                </div>
                <!-- 辅助元素文件搜索和全部隐藏控制 -->
                <div class="file-list-controls">
                    <div class="file-search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="assistFileSearchInput" placeholder="搜索辅助元素文件...">
                        <button id="clearAssistFileSearch" title="清除搜索"><i class="fas fa-times"></i></button>
                    </div>
                    <button id="toggleAllAssistFilesVisibility" class="btn-toggle-all" title="全部隐藏/显示">
                        <i class="fas fa-eye"></i> 全部
                    </button>
                </div>
                <div id="assistFileList" class="assist-file-list">
                    <div class="no-data">暂无辅助元素文件，请导入</div>
                </div>
            </div>


        </div>
    </div>

    <script src="app.js"></script>
    
    <!-- 用户向导 -->
    <div id="tourOverlay" class="tour-overlay"></div>
    <div id="tourTooltip" class="tour-tooltip">
        <div class="tour-tooltip-header">
            <div class="tour-tooltip-icon"><i class="fas fa-lightbulb"></i></div>
            <h4 class="tour-tooltip-title">功能提示</h4>
        </div>
        <div class="tour-tooltip-content" id="tourContent"></div>
        <div class="tour-tooltip-footer">
            <div class="tour-step-indicator">步骤 <span id="tourCurrentStep">1</span> / <span id="tourTotalSteps">6</span></div>
            <div class="tour-buttons">
                <button class="tour-btn tour-btn-skip" id="tourSkipBtn">跳过</button>
                <button class="tour-btn tour-btn-next" id="tourNextBtn">下一步</button>
            </div>
        </div>
    </div>
    <button id="tourStartBtn" class="tour-start-btn" title="重新查看向导"><i class="fas fa-question-circle"></i></button>
</body>
</html>
