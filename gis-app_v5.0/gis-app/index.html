<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XX市学区范围绘制工具</title>
    <!-- 关键CSS内联：确保loading动画立即显示 -->
    <style>
        /* 重置样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* 页面加载进度条 - 关键样式内联 */
        .page-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .page-loader.hidden {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        .loader-content {
            text-align: center;
            color: white;
            padding: 40px;
            max-width: 400px;
        }
        .loader-spinner {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
        }
        .spinner-ring {
            position: absolute;
            border: 4px solid transparent;
            border-top-color: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
        }
        .spinner-ring:nth-child(1) {
            width: 80px;
            height: 80px;
            top: 0;
            left: 0;
            animation-duration: 1.2s;
        }
        .spinner-ring:nth-child(2) {
            width: 60px;
            height: 60px;
            top: 10px;
            left: 10px;
            border-top-color: rgba(255, 255, 255, 0.6);
            animation-duration: 0.9s;
            animation-direction: reverse;
        }
        .spinner-ring:nth-child(3) {
            width: 40px;
            height: 40px;
            top: 20px;
            left: 20px;
            border-top-color: rgba(255, 255, 255, 0.3);
            animation-duration: 0.6s;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loader-text h3 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .loader-text p {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 25px;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            border-radius: 10px;
            width: 5%;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
        }
        .progress-percent {
            font-size: 14px;
            font-weight: 600;
        }
        .loader-tips {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 15px;
            line-height: 1.5;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            animation: fadeInOut 3s ease-in-out infinite;
        }
        @keyframes fadeInOut {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        /* 响应式 */
        @media (max-width: 480px) {
            .loader-content { padding: 30px 20px; }
            .loader-text h3 { font-size: 20px; }
            .loader-spinner { width: 60px; height: 60px; }
            .spinner-ring:nth-child(1) { width: 60px; height: 60px; }
            .spinner-ring:nth-child(2) { width: 45px; height: 45px; top: 7.5px; left: 7.5px; }
            .spinner-ring:nth-child(3) { width: 30px; height: 30px; top: 15px; left: 15px; }
        }
    </style>
    <link rel="stylesheet" href="lib/ol.css">
    <link rel="stylesheet" href="fontawesome.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="lib/ol.js" onerror="window.resourceLoadError && window.resourceLoadError('OpenLayers')"></script>
    <script src="lib/jquery.min.js" onerror="window.resourceLoadError && window.resourceLoadError('jQuery')"></script>
    <script>
        // 资源加载错误处理
        window.resourceLoadError = function(resourceName) {
            console.error('[资源加载失败] ' + resourceName);
            var loader = document.getElementById('pageLoader');
            var status = document.getElementById('loaderStatus');
            var tips = document.getElementById('loaderTips');
            
            if (status) {
                status.innerHTML = '<i class="fas fa-exclamation-triangle" style="color:#ff6b6b;"></i> ' + resourceName + ' 加载失败';
                status.style.color = '#ff6b6b';
            }
            if (tips) {
                tips.innerHTML = '<i class="fas fa-sync-alt"></i> 请检查网络连接后刷新页面重试';
                tips.style.color = '#ff6b6b';
                tips.style.animation = 'none';
            }
            if (loader) {
                loader.style.background = 'linear-gradient(135deg, #4a1c1c 0%, #721c24 100%)';
            }
        };
        
        // 全局错误处理
        window.onerror = function(msg, url, line) {
            console.error('[全局错误]', msg, url, line);
            if (msg && (msg.includes('ol') || msg.includes('OpenLayers'))) {
                window.resourceLoadError('地图引擎');
            } else if (msg && msg.includes('$') || msg.includes('jQuery')) {
                window.resourceLoadError('工具库');
            }
            return false;
        };
        
        // 立即启动进度条动画 - 不等待外部JS
        (function() {
            var startTime = Date.now();
            var progress = 5;
            var maxProgress = 85; // 最大到85%，留给应用初始化完成最后的15%
            
            function updateProgress() {
                var elapsed = Date.now() - startTime;
                var fill = document.getElementById('progressFill');
                var percent = document.getElementById('progressPercent');
                var status = document.getElementById('loaderStatus');
                
                if (!fill) return;
                
                // 前5秒快速增长到40%
                if (elapsed < 5000) {
                    progress = 5 + (elapsed / 5000) * 35;
                } 
                // 5-20秒缓慢增长到70%
                else if (elapsed < 20000) {
                    progress = 40 + ((elapsed - 5000) / 15000) * 30;
                }
                // 20-30秒缓慢增长到85%
                else if (elapsed < 30000) {
                    progress = 70 + ((elapsed - 20000) / 10000) * 15;
                }
                else {
                    progress = Math.min(progress + 0.1, maxProgress);
                }
                
                progress = Math.min(progress, maxProgress);
                
                fill.style.width = progress + '%';
                if (percent) percent.textContent = Math.round(progress) + '%';
                
                // 更新状态文字
                if (status && elapsed > 5000 && elapsed < 10000) {
                    status.textContent = '正在加载地图引擎...';
                } else if (status && elapsed > 10000 && elapsed < 20000) {
                    status.textContent = '正在初始化组件...';
                } else if (status && elapsed > 20000) {
                    status.textContent = '网络较慢，请继续等待...';
                }
                
                // 继续更新直到应用接管
                if (progress < maxProgress) {
                    requestAnimationFrame(updateProgress);
                }
            }
            
            // 立即开始更新
            requestAnimationFrame(updateProgress);
            
            // 暴露全局方法供app.js调用完成加载
            window.completeLoading = function() {
                var fill = document.getElementById('progressFill');
                var percent = document.getElementById('progressPercent');
                var loader = document.getElementById('pageLoader');
                
                if (fill) fill.style.width = '100%';
                if (percent) percent.textContent = '100%';
                
                setTimeout(function() {
                    if (loader) {
                        loader.classList.add('hidden');
                        setTimeout(function() {
                            if (loader.parentNode) {
                                loader.parentNode.removeChild(loader);
                            }
                        }, 600);
                    }
                }, 300);
            };
        })();
    </script>
</head>
<body>
    <!-- 页面加载进度条 -->
    <div id="pageLoader" class="page-loader">
        <div class="loader-content">
            <div class="loader-spinner">
                <div class="spinner-ring"></div>
                <div class="spinner-ring"></div>
                <div class="spinner-ring"></div>
            </div>
            <div class="loader-text">
                <h3>🏫 学区绘制工具</h3>
                <p id="loaderStatus">正在连接服务器...</p>
            </div>
            <div class="loader-progress">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 5%;"></div>
                </div>
                <span class="progress-percent" id="progressPercent">5%</span>
            </div>
            <div class="loader-tips" id="loaderTips">
                <span style="opacity:0.9;">📡 正在从 GitHub Pages 加载资源...</span><br>
                <span style="font-size:11px;opacity:0.7;">国内访问可能需要 10-30 秒，请耐心等待</span>
            </div>
            <noscript>
                <div style="color: #ff6b6b; margin-top: 15px; padding: 10px; background: rgba(255,0,0,0.1); border-radius: 6px;">
                    ⚠️ 您的浏览器禁用了JavaScript，无法使用本工具。
                </div>
            </noscript>
        </div>
    </div>
    
    <!-- 标题栏 -->
    <div class="header">
        <div>
            <h1><i class="fas fa-map"></i> XX市学区范围绘制工具</h1>
        </div>
    </div>

    <!-- 主内容区域 -->
    <div class="main-content">
        <!-- 左侧边栏 - JSON文件列表 -->
        <div class="sidebar sidebar-left" id="sidebar">
            <!-- 侧边栏收缩按钮 -->
            <button id="sidebarToggle" class="sidebar-toggle" title="收缩/展开侧边栏">
                <i class="fas fa-chevron-left"></i>
            </button>
            
            <!-- JSON文件管理区域 -->
            <div class="json-manager-section">
                <div class="json-file-list-header">
                    <span><i class="fas fa-folder-open"></i> 学区文件列表</span>
                    <div class="header-actions">
                        <span id="jsonFileCountBadge" class="badge">0</span>
                        <button id="importFolder" class="btn-import-folder" title="导入整个文件夹">
                            <i class="fas fa-folder-open"></i> 文件夹
                        </button>
                        <button id="importGeoJSON" class="btn-import" title="导入学区文件">
                            <i class="fas fa-upload"></i> 导入
                        </button>
                    </div>
                </div>
                <!-- 文件搜索和全部隐藏控制 -->
                <div class="file-list-controls">
                    <div class="file-search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="fileSearchInput" placeholder="搜索文件名...">
                        <button id="clearFileSearch" title="清除搜索"><i class="fas fa-times"></i></button>
                    </div>
                    <button id="toggleAllFilesVisibility" class="btn-toggle-all" title="全部隐藏/显示">
                        <i class="fas fa-eye"></i> 全部
                    </button>
                </div>
                <div id="jsonFileList" class="json-file-list">
                    <div class="no-data">暂无学区文件，请导入</div>
                </div>
            </div>
            
            <input type="file" id="geoJSONFile" accept=".geojson,.json" style="display: none;">
            <input type="file" id="geoJSONFolder" webkitdirectory directory multiple style="display: none;">

            <!-- 状态信息 -->
            <div class="status-section">
                <div class="status-info">
                    <p><strong>当前模式:</strong> <span id="currentMode">浏览</span></p>
                    <p><strong>选中学区:</strong> <span id="selectedJSON">无</span></p>
                    <p><strong>多边形数量:</strong> <span id="polygonCount">0</span></p>
                </div>
            </div>
            
            <!-- 天地图KEY管理 -->
            <div class="key-manager-section">
                <div class="key-manager-header" id="keyManagerToggle">
                    <span><i class="fas fa-key"></i> 天地图KEY管理</span>
                    <i class="fas fa-chevron-down" id="keyManagerArrow"></i>
                </div>
                <div class="key-manager-content" id="keyManagerContent" style="display: none;">
                    <div class="key-status">
                        <span class="key-status-label">当前使用:</span>
                        <span class="key-status-value" id="currentKeyIndex">1/7</span>
                        <span class="key-status-indicator" id="keyStatusIndicator" title="点击刷新状态"></span>
                    </div>
                    <div class="key-actions">
                        <button id="addKeyBtn" class="btn-key-action" title="添加新KEY">
                            <i class="fas fa-plus"></i> 添加
                        </button>
                        <button id="viewKeysBtn" class="btn-key-action" title="查看/管理KEY">
                            <i class="fas fa-list"></i> 管理
                        </button>
                        <button id="resetKeyBtn" class="btn-key-action" title="重置KEY状态">
                            <i class="fas fa-redo"></i> 重置
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 地图容器 -->
        <div class="map-container">
            <div id="map" class="map"></div>
            
            <!-- 地图悬浮工具栏 -->
            <div class="floating-toolbar">
                <!-- 搜索框 -->
                <div class="toolbar-search">
                    <input type="text" id="searchInput" placeholder="搜索地点...">
                    <button id="searchBtn" title="搜索">
                        <i class="fas fa-search"></i>
                    </button>
                    <button id="clearSearch" title="清除搜索">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                
                <!-- 工具按钮组 -->
                <div class="toolbar-group">
                    <button id="drawPolygon" title="绘制多边形">
                        <i class="fas fa-draw-polygon"></i>
                    </button>
                </div>
                
                <div class="toolbar-divider"></div>
                
                <!-- 辅助绘制工具 -->
                <div class="toolbar-group">
                    <button id="drawAssistLine" title="绘制辅助线">
                        <i class="fas fa-slash"></i>
                    </button>
                    <button id="drawAssistPolygon" title="绘制辅助多边形">
                        <i class="fas fa-square"></i>
                    </button>
                    <button id="drawAssistText" title="添加辅助文字">
                        <i class="fas fa-font"></i>
                    </button>
                    <button id="drawAssistPoint" title="添加辅助点">
                        <i class="fas fa-map-marker-alt"></i>
                    </button>
                </div>
                
                <div class="toolbar-divider"></div>
                
                <!-- 测量工具 -->
                <div class="toolbar-group">
                    <button id="measureLength" title="测距">
                        <i class="fas fa-ruler"></i>
                    </button>
                    <button id="measureArea" title="测面">
                        <i class="fas fa-draw-polygon"></i>
                    </button>
                    <button id="clearMeasure" title="清除测量结果" class="danger">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
                
                <div class="toolbar-divider"></div>
                
                <!-- 辅助要素管理 -->
                <div class="toolbar-group">
                    <button id="selectAssistFeature" title="选择辅助要素">
                        <i class="fas fa-hand-pointer"></i>
                    </button>
                    <button id="editAssistPolygon" title="编辑辅助多边形形状(进入后可点击顶点选中)" style="position: relative;">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button id="deleteAssistFeature" title="删除选中的辅助要素" class="danger">
                        <i class="fas fa-eraser"></i>
                    </button>
                    <button id="clearAssistFeatures" title="清除所有辅助要素" class="danger">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                    <button id="toggleAssistVisibility" title="隐藏/显示辅助要素">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                
                <div class="toolbar-divider"></div>
                
                <div class="toolbar-group">
                    <button id="selectPolygon" title="选择多边形">
                        <i class="fas fa-mouse-pointer"></i>
                    </button>
                    <button id="editPolygon" title="编辑多边形">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button id="deletePolygon" title="删除选中">
                        <i class="fas fa-trash"></i>
                    </button>
                    <button id="deleteVertex" title="删除顶点(编辑时)">
                        <i class="fas fa-cut"></i>
                    </button>
                </div>
                
                <div class="toolbar-divider"></div>
                
                <div class="toolbar-group">
                    <button id="exportGeoJSON" title="导出选中JSON">
                        <i class="fas fa-download"></i>
                    </button>
                </div>
            </div>
            
            <!-- 地图控制按钮 -->
            <div class="map-controls">
                <button id="zoomIn" title="放大"><i class="fas fa-plus"></i></button>
                <button id="zoomOut" title="缩小"><i class="fas fa-minus"></i></button>
                <button id="resetView" title="复位"><i class="fas fa-home"></i></button>
            </div>
            
            <!-- 底图图层控制按钮 -->
            <div class="layer-controls">
                <button id="toggleImageLayer" title="切换到影像底图"><i class="fas fa-map"></i></button>
                <button id="toggleOpacityPanel" title="图层透明度"><i class="fas fa-adjust"></i></button>
            </div>
            
            <!-- 透明度控制面板 -->
            <div id="opacityControlPanel" class="opacity-control-panel">
                <div class="opacity-header">
                    <span>图层透明度</span>
                    <span id="opacityValue">100%</span>
                </div>
                <div class="opacity-slider-container">
                    <input type="range" id="layerOpacity" min="0" max="1" step="0.05" value="1">
                    <div class="opacity-labels">
                        <span>0%</span>
                        <span>50%</span>
                        <span>100%</span>
                    </div>
                </div>
                <div class="opacity-info">
                    <i class="fas fa-info-circle"></i> 调整影像图层透明度
                </div>
            </div>
            
            <!-- 搜索结果面板 -->
            <div id="searchResultsPanel" class="search-results-panel">
                <div class="search-results-header">
                    <span>搜索结果</span>
                    <button id="closeSearchResults"><i class="fas fa-times"></i></button>
                </div>
                <div id="searchResults" class="search-results"></div>
            </div>
        </div>

        <!-- 右侧边栏 - 辅助元素文件列表 -->
        <div class="sidebar sidebar-right" id="rightSidebar">
            <!-- 右侧边栏收缩按钮 -->
            <button id="rightSidebarToggle" class="sidebar-toggle right" title="收缩/展开侧边栏">
                <i class="fas fa-chevron-right"></i>
            </button>
            
            <input type="file" id="assistGeoJSONFile" accept=".geojson,.json" style="display: none;">
            <input type="file" id="assistGeoJSONFolder" webkitdirectory directory multiple style="display: none;">

            <!-- 辅助元素文件管理区域 -->
            <div class="assist-manager-section" id="assistManagerSection">
                <div class="assist-file-list-header">
                    <span><i class="fas fa-shapes"></i> 辅助元素文件列表</span>
                    <div class="header-actions">
                        <span id="assistFileCountBadge" class="badge">0</span>
                        <button id="importAssistFolder" class="btn-import-folder" title="导入辅助元素文件夹">
                            <i class="fas fa-folder-open"></i> 文件夹
                        </button>
                        <button id="importAssistFile" class="btn-import" title="导入辅助元素文件">
                            <i class="fas fa-upload"></i> 导入
                        </button>
                    </div>
                </div>
                <!-- 辅助元素文件搜索和全部隐藏控制 -->
                <div class="file-list-controls">
                    <div class="file-search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="assistFileSearchInput" placeholder="搜索辅助元素文件...">
                        <button id="clearAssistFileSearch" title="清除搜索"><i class="fas fa-times"></i></button>
                    </div>
                    <button id="toggleAllAssistFilesVisibility" class="btn-toggle-all" title="全部隐藏/显示">
                        <i class="fas fa-eye"></i> 全部
                    </button>
                </div>
                <div id="assistFileList" class="assist-file-list">
                    <div class="no-data">暂无辅助元素文件，请导入</div>
                </div>
            </div>


        </div>
    </div>

    <script src="app.js"></script>
    
    <!-- 用户向导 -->
    <div id="tourOverlay" class="tour-overlay"></div>
    <div id="tourTooltip" class="tour-tooltip">
        <div class="tour-tooltip-header">
            <div class="tour-tooltip-icon"><i class="fas fa-lightbulb"></i></div>
            <h4 class="tour-tooltip-title">功能提示</h4>
        </div>
        <div class="tour-tooltip-content" id="tourContent"></div>
        <div class="tour-tooltip-footer">
            <div class="tour-step-indicator">步骤 <span id="tourCurrentStep">1</span> / <span id="tourTotalSteps">6</span></div>
            <div class="tour-buttons">
                <button class="tour-btn tour-btn-skip" id="tourSkipBtn">跳过</button>
                <button class="tour-btn tour-btn-next" id="tourNextBtn">下一步</button>
            </div>
        </div>
    </div>
    <button id="tourStartBtn" class="tour-start-btn" title="重新查看向导"><i class="fas fa-question-circle"></i></button>
</body>
</html>
